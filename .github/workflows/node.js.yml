# Este workflow realiza uma instalação limpa das dependências, faz o build do projeto e executa testes (se existirem)
# Para mais informações, veja: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Versões LTS do Node.js recomendadas para Astro e ambientes modernos
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      # npm ci é mais rápido e confiável em ambientes de CI
      run: npm ci

    - name: Build project
      # O Astro gera os arquivos estáticos na pasta dist/
      run: npm run build

    - name: Run tests
      # Executa testes apenas se o script 'test' estiver definido no package.json
      run: npm test --if-present
